version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lgpd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lgpd-database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
    driver: local
