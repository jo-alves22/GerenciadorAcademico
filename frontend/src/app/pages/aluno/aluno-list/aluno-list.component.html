<div class="container">
  <div class="py-3 text-center">
    <h3>Cadastro de Alunos</h3>
  </div>
  <div class="row" *ngIf="!authService.isAluno()">
    <div class="col-12 d-flex align-content-end justify-content-end pb-5">
      <a class="btn btn-primary" [href]="'/alunos/form'">CADASTRAR ALUNO</a>
    </div>
  </div>
  <div class="row">
    <div class="col-md-12 mb-12">
      <table class="table">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Nome</th>
            <th scope="col">Matrícula</th>
            <th scope="col">CPF</th>
            <th scope="col">Email</th>
            <th scope="col">Curso</th>
            <th *ngIf="!authService.isAluno()" scope="col">Ação</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let aluno of alunos">
            <th scope="row">{{aluno.id}}</th>
            <td>{{aluno.nome}}</td>
            <td>{{aluno.matricula}}</td>
            <td>{{aluno.cpf}}</td>
            <td>{{aluno.email}}</td>
            <td>{{aluno.curso?.nome}}</td>
            <td *ngIf="!authService.isAluno()">
              <a class="btn btn-outline-primary" [href]="'/alunos/form?id='+aluno.id">
                <fa-icon [icon]="faPencil"></fa-icon>
              </a>
              <button type="button" class="btn btn-outline-danger" (click)="delete(aluno.id)">
                <fa-icon [icon]="faTrash"></fa-icon>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
