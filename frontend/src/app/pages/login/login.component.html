<div class="login-bg">
  <div class="login-left">
    <div class="login-left-content">
      <div class="login-logo">GA</div>
      <h1>Gerenciador<br>Acadêmico</h1>
      <p>Plataforma integrada de gestão educacional para administradores, professores e alunos.</p>
      <div class="login-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="login-right">
    <div class="login-card">
      <div class="login-card-header">
        <h2>Bem-vindo</h2>
        <p>Entre com suas credenciais para acessar o sistema</p>
      </div>

      <div *ngIf="erro" class="login-error">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ erro }}
      </div>

      <form (ngSubmit)="entrar()" #loginForm="ngForm">
        <div class="field-group">
          <label for="email">E-mail</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input
              id="email"
              type="email"
              class="field-input"
              [(ngModel)]="email"
              name="email"
              placeholder="seu@email.com"
              required
              autofocus
            />
          </div>
        </div>

        <div class="field-group">
          <label for="senha">Senha</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              id="senha"
              type="password"
              class="field-input"
              [(ngModel)]="senha"
              name="senha"
              placeholder="••••••••"
              required
            />
          </div>
        </div>

        <button type="submit" class="btn-entrar" [disabled]="carregando || !loginForm.valid">
          <svg *ngIf="carregando" class="spin" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
            <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
            <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
            <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
            <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/>
            <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
          </svg>
          {{ carregando ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>
    </div>
  </div>
</div>
