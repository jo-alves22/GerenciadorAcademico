<div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100 bg-light">
  <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <h4 class="fw-bold mb-1">Gerenciador Acadêmico</h4>
        <p class="text-muted small">Acesse sua conta para continuar</p>
      </div>

      <div *ngIf="erro" class="alert alert-danger py-2 small">{{ erro }}</div>

      <form (ngSubmit)="entrar()" #loginForm="ngForm">
        <div class="mb-3">
          <label for="email" class="form-label">E-mail</label>
          <input
            id="email"
            type="email"
            class="form-control"
            [(ngModel)]="email"
            name="email"
            placeholder="seu@email.com"
            required
            autofocus
          />
        </div>

        <div class="mb-4">
          <label for="senha" class="form-label">Senha</label>
          <input
            id="senha"
            type="password"
            class="form-control"
            [(ngModel)]="senha"
            name="senha"
            placeholder="••••••••"
            required
          />
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100"
          [disabled]="carregando || !loginForm.valid"
        >
          <span *ngIf="carregando" class="spinner-border spinner-border-sm me-2"></span>
          {{ carregando ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>
    </div>
  </div>
</div>
