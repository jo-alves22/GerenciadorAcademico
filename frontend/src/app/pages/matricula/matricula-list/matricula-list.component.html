<div class="container">
  <div class="py-3 text-center">
    <h3>Matrículas</h3>
  </div>
  <div class="row" *ngIf="!authService.isAluno()">
    <div class="col-12 d-flex justify-content-end pb-3">
      <a class="btn btn-primary" [href]="'/matriculas/form'">NOVA MATRÍCULA</a>
    </div>
  </div>
  <div class="row">
    <div class="col-md-12">
      <table class="table table-striped table-hover">
        <thead class="table-dark">
          <tr>
            <th>Matrícula</th>
            <th>Aluno</th>
            <th>Disciplina</th>
            <th>Período</th>
            <th>Data Matrícula</th>
            <th>Situação</th>
            <th *ngIf="!authService.isAluno()">Ação</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let m of matriculas">
            <td>{{ m.aluno?.matricula }}</td>
            <td>{{ m.aluno?.usuario?.nome }}</td>
            <td>{{ m.turma?.disciplina?.nome }}</td>
            <td>{{ m.turma?.periodo }}/{{ m.turma?.ano }}</td>
            <td>{{ m.dataMatricula }}</td>
            <td>
              <span class="badge" [ngClass]="situacaoBadge(m.situacao)">{{ m.situacao }}</span>
            </td>
            <td *ngIf="!authService.isAluno()">
              <a class="btn btn-sm btn-outline-primary me-1" [href]="'/matriculas/form?id=' + m.id">
                <fa-icon [icon]="faPencil"></fa-icon>
              </a>
              <button class="btn btn-sm btn-outline-danger" (click)="delete(m.id)">
                <fa-icon [icon]="faTrash"></fa-icon>
              </button>
            </td>
          </tr>
          <tr *ngIf="matriculas.length === 0">
            <td colspan="7" class="text-center text-muted">Nenhuma matrícula cadastrada.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
